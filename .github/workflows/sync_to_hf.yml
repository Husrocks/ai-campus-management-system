name: Sync to Hugging Face
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Push Backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd backend
          git init -b main
          git config user.name "Husrocks"
          git config user.email "Husrocks@users.noreply.github.com"
          git add .
          git commit -m "deploy: sync backend to root"
          git push --force https://Husrocks:$HF_TOKEN@huggingface.co/spaces/Jimmy21ki09/ai-campus-api main
